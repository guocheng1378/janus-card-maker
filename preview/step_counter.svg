<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 596 596">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="100%" style="stop-color:#0a2a1a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e676"/>
      <stop offset="100%" style="stop-color:#69f0ae"/>
    </linearGradient>
  </defs>
  <rect width="596" height="596" rx="24" fill="url(#bg)"/>
  <!-- Icon -->
  <text x="60" y="70" font-size="36">🦶</text>
  <text x="110" y="75" font-family="sans-serif" font-size="18" fill="#4a6a4a">今日步数</text>
  <!-- Big number -->
  <text x="60" y="165" font-family="'SF Pro Display',sans-serif" font-size="100" font-weight="800" fill="#00e676">7,832</text>
  <!-- Goal -->
  <text x="60" y="205" font-family="sans-serif" font-size="18" fill="#4a6a4a">/ 10,000 步</text>
  <!-- Progress bar bg -->
  <rect x="60" y="235" width="380" height="12" rx="6" fill="#1a3a1a"/>
  <!-- Progress bar fill -->
  <rect x="60" y="235" width="297" height="12" rx="6" fill="url(#bar)"/>
  <!-- Percentage -->
  <text x="60" y="280" font-family="sans-serif" font-size="16" fill="#4a6a4a">78% 完成</text>
  <!-- Mini stats -->
  <rect x="60" y="320" width="160" height="60" rx="12" fill="#ffffff" fill-opacity="0.04"/>
  <text x="140" y="350" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4a6a4a">卡路里</text>
  <text x="140" y="372" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#ffffff">256 千卡</text>
  <rect x="240" y="320" width="160" height="60" rx="12" fill="#ffffff" fill-opacity="0.04"/>
  <text x="320" y="350" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4a6a4a">距离</text>
  <text x="320" y="372" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#ffffff">4.2 公里</text>
  <!-- Label -->
  <rect x="60" y="480" width="120" height="36" rx="18" fill="#00e676" fill-opacity="0.15"/>
  <text x="120" y="504" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#00e676">🚶 步数计</text>
</svg>
