<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 596 596">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="596" height="596" rx="24" fill="url(#bg)"/>
  <!-- Event label -->
  <text x="60" y="80" font-family="sans-serif" font-size="22" fill="#666666">我的生日</text>
  <!-- Big countdown number -->
  <text x="60" y="180" font-family="'SF Pro Display',sans-serif" font-size="140" font-weight="800" fill="#ff6b6b" filter="url(#glow)">258</text>
  <!-- "天" label -->
  <text x="60" y="240" font-family="sans-serif" font-size="36" fill="#ffffff">天</text>
  <!-- Accent line -->
  <rect x="60" y="270" width="100" height="4" rx="2" fill="#ff6b6b"/>
  <!-- Sub text -->
  <text x="60" y="310" font-family="sans-serif" font-size="18" fill="#666666">距离 12-25</text>
  <!-- Decorative dots -->
  <circle cx="500" cy="100" r="80" fill="#ff6b6b" opacity="0.04"/>
  <circle cx="520" cy="400" r="60" fill="#7c4dff" opacity="0.04"/>
  <!-- Label -->
  <rect x="60" y="480" width="120" height="36" rx="18" fill="#ff6b6b" fill-opacity="0.15"/>
  <text x="120" y="504" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#ff6b6b">⏳ 倒计时</text>
</svg>
