<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 596 596">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0a1a2a"/>
    </linearGradient>
  </defs>
  <rect width="596" height="596" rx="24" fill="url(#bg)"/>
  <!-- Title -->
  <text x="60" y="55" font-family="sans-serif" font-size="18" fill="#888888">🌍 世界时钟</text>
  <!-- Divider -->
  <rect x="60" y="70" width="380" height="1" fill="#333333"/>
  <!-- TZ1 -->
  <text x="60" y="110" font-family="sans-serif" font-size="20" fill="#4fc3f7" font-weight="600">北京</text>
  <text x="60" y="160" font-family="'SF Pro Display',sans-serif" font-size="64" font-weight="700" fill="#ffffff">14:30</text>
  <rect x="60" y="180" width="380" height="1" fill="#222222"/>
  <!-- TZ2 -->
  <text x="60" y="220" font-family="sans-serif" font-size="20" fill="#888888">东京</text>
  <text x="60" y="270" font-family="'SF Pro Display',sans-serif" font-size="64" font-weight="700" fill="#ffffff">15:30</text>
  <rect x="60" y="290" width="380" height="1" fill="#222222"/>
  <!-- TZ3 -->
  <text x="60" y="330" font-family="sans-serif" font-size="20" fill="#888888">纽约</text>
  <text x="60" y="380" font-family="'SF Pro Display',sans-serif" font-size="64" font-weight="700" fill="#ffffff">02:30</text>
  <!-- Decorative -->
  <circle cx="500" cy="150" r="80" fill="#4fc3f7" opacity="0.04"/>
  <circle cx="480" cy="350" r="60" fill="#7c4dff" opacity="0.03"/>
  <!-- Label -->
  <rect x="60" y="480" width="120" height="36" rx="18" fill="#4fc3f7" fill-opacity="0.15"/>
  <text x="120" y="504" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#4fc3f7">🌍 世界时钟</text>
</svg>
