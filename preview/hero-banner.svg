<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 976 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="50%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#0a2a3e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#4fc3f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ffd93d"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="glowf"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Background -->
  <rect width="976" height="400" fill="url(#bg)"/>
  <!-- Decorative orbs -->
  <circle cx="120" cy="80" r="120" fill="#4fc3f7" opacity="0.06" filter="url(#blur)"/>
  <circle cx="850" cy="320" r="100" fill="#ff6b6b" opacity="0.06" filter="url(#blur)"/>
  <circle cx="500" cy="200" r="180" fill="#7c4dff" opacity="0.04" filter="url(#blur)"/>
  <!-- Grid lines -->
  <line x1="0" y1="100" x2="976" y2="100" stroke="#ffffff" stroke-opacity="0.03"/>
  <line x1="0" y1="200" x2="976" y2="200" stroke="#ffffff" stroke-opacity="0.03"/>
  <line x1="0" y1="300" x2="976" y2="300" stroke="#ffffff" stroke-opacity="0.03"/>
  <line x1="244" y1="0" x2="244" y2="400" stroke="#ffffff" stroke-opacity="0.03"/>
  <line x1="488" y1="0" x2="488" y2="400" stroke="#ffffff" stroke-opacity="0.03"/>
  <line x1="732" y1="0" x2="732" y2="400" stroke="#ffffff" stroke-opacity="0.03"/>
  <!-- Title -->
  <text x="488" y="140" text-anchor="middle" font-family="'MiSans','SF Pro Display',system-ui,sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">
    <tspan>REAR</tspan><tspan fill="url(#accent)">EYE</tspan>
  </text>
  <text x="488" y="190" text-anchor="middle" font-family="'MiSans','SF Pro Display',system-ui,sans-serif" font-size="28" font-weight="300" fill="#8899aa" letter-spacing="12">
    卡片制作器
  </text>
  <!-- Glow line -->
  <rect x="288" y="210" width="400" height="2" rx="1" fill="url(#glow)"/>
  <!-- Version badge -->
  <rect x="428" y="230" width="120" height="28" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
  <text x="488" y="249" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#4fc3f7">v5 · 27 模板</text>
  <!-- Feature pills -->
  <rect x="178" y="280" width="100" height="30" rx="15" fill="#ffffff" fill-opacity="0.06"/>
  <text x="228" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaaacc">🌤️ 天气绑定</text>
  <rect x="298" y="280" width="100" height="30" rx="15" fill="#ffffff" fill-opacity="0.06"/>
  <text x="348" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaaacc">🎵 音乐控制</text>
  <rect x="418" y="280" width="100" height="30" rx="15" fill="#ffffff" fill-opacity="0.06"/>
  <text x="468" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaaacc">⏳ 倒计时</text>
  <rect x="538" y="280" width="100" height="30" rx="15" fill="#ffffff" fill-opacity="0.06"/>
  <text x="588" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaaacc">🌍 世界时钟</text>
  <rect x="658" y="280" width="120" height="30" rx="15" fill="#ffffff" fill-opacity="0.06"/>
  <text x="718" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaaacc">📱 PWA 离线</text>
  <!-- Bottom tagline -->
  <text x="488" y="365" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#556677">
    为小米背屏（SubScreen）制作 MAML 卡片模板
  </text>
</svg>
